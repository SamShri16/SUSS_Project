<!DOCTYPE html>
<html>
<head>
    <title>SUSS</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 bg-dark text-white p-3" style="height:100vh;">
            <h4>SUSS</h4>
            <hr>

            <a href="/dashboard/" class="text-white d-block mb-2">Dashboard</a>
            <a href="/expenses/" class="text-white d-block mb-2">Expenses</a>
            <a href="/income/" class="text-white d-block mb-2">Income</a>
            <a href="/notes/" class="text-white d-block mb-2">Notes</a>
            <a href="/planner/" class="text-white d-block mb-2">Planner</a>

            <hr>
            <a href="/logout/" class="btn btn-danger w-100">Logout</a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 p-4">

            <!-- ALERTS -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}

        </div>
    </div>
</div>

<script>
function confirmDelete(url){
    if(confirm("Are you sure?")){
        window.location.href = url;
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
