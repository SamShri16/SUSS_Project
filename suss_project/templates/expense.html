{% extends 'base.html' %}

{% block content %}

<h2>Expense Tracker</h2>

<form method="POST" class="mb-3">
    {% csrf_token %}
    <input name="amount" class="form-control mb-2" placeholder="Amount">
    <input name="category" class="form-control mb-2" placeholder="Category">
    <button class="btn btn-primary">Add Expense</button>
</form>

<ul class="list-group">
{% for i in data %}
    <li class="list-group-item">{{ i.category }} - ₹{{ i.amount }}</li>
{% empty %}
    <li class="list-group-item">No expenses yet</li>
{% endfor %}
</ul>

{% endblock %}
