<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>
</head>
<body>

<a href="/dashboard/">⬅ Back to Dashboard</a>

<h2>Notes</h2>

<form method="POST">
    {% csrf_token %}
    <input name="title" placeholder="Title"><br><br>
    <textarea name="content" placeholder="Write note here"></textarea><br><br>
    <button>Add Note</button>
</form>

<hr>

<h3>Your Notes:</h3>

<ul>
{% for i in data %}
    <li><b>{{ i.title }}</b> - {{ i.content }}</li>
{% empty %}
    <li>No notes yet</li>
{% endfor %}
</ul>

</body>
</html>
