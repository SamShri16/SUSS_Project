<!DOCTYPE html>
<html>
<head>
    <title>Planner</title>
</head>
<body>

<a href="/dashboard/">⬅ Back to Dashboard</a>

<h2>Study Planner</h2>

<form method="POST">
    {% csrf_token %}
    <input name="title" placeholder="Task"><br><br>
    <input type="date" name="deadline"><br><br>
    <button>Add Task</button>
</form>

<hr>

<h3>Your Tasks:</h3>

<ul>
{% for i in data %}
    <li>{{ i.title }} - {{ i.deadline }}</li>
{% empty %}
    <li>No tasks yet</li>
{% endfor %}
</ul>

</body>
</html>
