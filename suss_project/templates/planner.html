{% extends 'base.html' %}

{% block content %}

<h2>Study Planner</h2>

<form method="POST" class="mb-3">
    {% csrf_token %}
    <input name="title" class="form-control mb-2" placeholder="Task">
    <input type="date" name="deadline" class="form-control mb-2">
    <button class="btn btn-warning">Add Task</button>
</form>

<ul class="list-group">
{% for i in data %}
    <li class="list-group-item">{{ i.title }} - {{ i.deadline }}</li>
{% empty %}
    <li class="list-group-item">No tasks yet</li>
{% endfor %}
</ul>

{% endblock %}
