<!DOCTYPE html>
<html>
<head>
    <title>Register - SUSS</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="center-box">
    <div class="card p-4" style="width:350px;">

        <h3 class="text-center">Register</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-warning">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" onsubmit="return validateForm()">
            {% csrf_token %}

            <input name="username" class="form-control mb-2" placeholder="Username">

            <input name="email" class="form-control mb-2" placeholder="Email">

            <div class="input-group mb-2">
                <input type="password" id="pass1" name="password" class="form-control" placeholder="Password">
                <button type="button" class="btn btn-outline-secondary" onclick="toggle('pass1')">👁</button>
            </div>

            <div class="input-group mb-2">
                <input type="password" id="pass2" name="confirm_password" class="form-control" placeholder="Confirm Password">
                <button type="button" class="btn btn-outline-secondary" onclick="toggle('pass2')">👁</button>
            </div>

            <button class="btn btn-success w-100">Register</button>
        </form>

        <p class="mt-3 text-center">
            Already have an account? <a href="/login/">Login</a>
        </p>

    </div>
</div>

<script>
function toggle(id){
    let p = document.getElementById(id);
    p.type = (p.type === "password") ? "text" : "password";
}

function validateForm(){
    let p1 = document.getElementById("pass1").value;
    let p2 = document.getElementById("pass2").value;

    if(p1.length < 6){
        alert("Password must be at least 6 characters");
        return false;
    }

    if(p1 !== p2){
        alert("Passwords do not match");
        return false;
    }

    return true;
}
</script>

</body>
</html>
