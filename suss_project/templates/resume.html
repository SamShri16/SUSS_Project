{% extends 'base.html' %}

{% block content %}

<h2>Resume Matcher</h2>

<form method="POST" class="mb-3">
    {% csrf_token %}
    <textarea name="resume" class="form-control mb-2" placeholder="Paste resume"></textarea>
    <input name="skills" class="form-control mb-2" placeholder="skills (comma)">
    <button class="btn btn-info">Match</button>
</form>

{% if score %}
<div class="alert alert-success">
    Match Score: {{ score }}%
</div>
{% endif %}

{% endblock %}
