{% extends 'base.html' %}

{% block content %}

<h3>Resume Matcher</h3>

<form method="POST">
    {% csrf_token %}
    <textarea name="resume" class="form-control mb-2"></textarea>
    <input name="skills" class="form-control mb-2" placeholder="Skills (comma separated)">
    <button class="btn btn-danger">Match</button>
</form>

{% if score %}
    <h4 class="mt-3">Match: {{ score }}%</h4>
{% endif %}

{% endblock %}
